services:

  book-service:
    build:
      context: ./book-service
    container_name: book-service
    environment:
      - PORT=3001
    networks:
      - backend-net

  member-service:
    build:
      context: ./member-service
    container_name: member-service
    environment:
      - PORT=3002
    networks:
      - backend-net

  loan-service:
    build:
      context: ./loan-service
    container_name: loan-service
    environment:
      - PORT=3003
      - BOOK_SERVICE_URL=http://book-service:3001
      - MEMBER_SERVICE_URL=http://member-service:3002
    depends_on:
      - book-service
      - member-service
    networks:
      - backend-net

  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      - book-service
      - member-service
      - loan-service
    networks:
      - backend-net

networks:
  backend-net:
    driver: bridge