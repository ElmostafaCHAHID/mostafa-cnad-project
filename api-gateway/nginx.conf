events {
  worker_connections 1024;
}

http {

  # Logging format
  log_format gateway_log
  '$time_iso8601 | $request_method $request_uri | '
  'Status: $status | Upstream: $upstream_addr | '
  'Duration: ${request_time}s | Client: $remote_addr';

  access_log /dev/stdout gateway_log;
  error_log /dev/stderr warn;

  # Upstreams (Docker DNS names later)
  upstream book_upstream {
    server book-service:3001;
  }

  upstream member_upstream {
    server member-service:3002;
  }

  upstream loan_upstream {
    server loan-service:3003;
  }

  server {
    listen 8080;
    server_name api-gateway;

    # CORS headers
    add_header 'Access-Control-Allow-Origin' '*';
    add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS';
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';

    add_header 'X-Gateway' 'nginx-api-gateway';

    # BOOK ROUTES
    location /books {
      proxy_pass http://book_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # MEMBER ROUTES
    location /members {
      proxy_pass http://member_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # LOAN ROUTES
    location /loans {
      proxy_pass http://loan_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Gateway health
    location /gateway/health {
      return 200 '{"status":"UP","gateway":"nginx"}';
      add_header Content-Type application/json;
    }

  }
}